# Scratch file for re-authoring the kiosk ROI. Edit roi_polygon below, run
# preview_roi.py, look at the PNG and the per-track table, repeat. Nothing reads this
# file except preview_roi.py — the pipeline is unaffected until you copy an approved
# polygon into configs/cam1_v2.yaml (or cam1.yaml) yourself.
#
#   python preview_roi.py --run-dir outputs/staff_thresh/staff05_crowded --frame 108637
#
# Coordinates are pixels in the native 1280x720 frame, listed clockwise. Use
# define_roi.py if you would rather click the shape out on a frame than type numbers.
#
# Starting value = the current production polygon, so an unedited run shows "no change"
# and any difference you see is genuinely yours.
#
# Reminder on the bottom edge: 721 is deliberate and sits just past the frame's last row
# (719). A person at the near edge is cut off by the frame, so their box bottom clamps to
# the image boundary; an edge drawn at 716, or exactly at 720 where ray-casting is
# boundary-ambiguous, silently drops them. Keep the bottom edge >= 721.
roi_polygon:
  - [408, 681]
  - [704, 332]
  - [1017, 388]
  - [1007, 721]
  - [413, 721]

# Fraction of a box's height, measured up from the feet, that must also be inside the
# polygon. The sweep in decisions.md settled on 0.4; raising it was measured to cost a
# recovered customer. Change it here only to see what a different value would do.
box_depth_frac: 0.4
min_box_aspect: 0.1
