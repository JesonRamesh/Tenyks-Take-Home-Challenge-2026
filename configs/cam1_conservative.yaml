# Conservative-stitch variant of the ROI-fix pipeline. IDENTICAL to the aggressive
# roifix run in every way (ROI 721, YOLOv8n+ByteTrack, staff 0.5, OSNet stitch sim 0.6)
# EXCEPT reid.gap_frames: 3000 -> 900. The narrower gap re-links less aggressively, which
# stops the wrong 'new person gets an old id' merges: on the full video (offline replay)
# this cut dwell MAPE 26.9% -> 18.4% and MAE 82.9s -> 67.4s and raised purity, at a count
# cost (+23 -> +60), because genuine re-entries fragment. It is a count-vs-dwell trade on
# the same camera-geometry frontier, not a free win. See decisions.md. Outputs go to their
# own paths so the aggressive run's artifacts are never overwritten.
camera_id: cam1
kiosk_roi:
  roi_polygon:
  - - 408
    - 681
  - - 704
    - 332
  - - 1017
    - 388
  - - 1007
    - 721
  - - 413
    - 721
  box_depth_frac: 0.4
  min_box_aspect: 0.1
detector:
  model: yolov8n
  confidence: 0.1
  classes:
  - 0
  imgsz: 640
  device: auto
tracker:
  type: bytetrack
  track_high_thresh: 0.5
  track_low_thresh: 0.1
  new_track_thresh: 0.6
  match_thresh: 0.8
  track_buffer: 30
  fuse_score: true
reid:
  post_hoc_stitch: true
  model: weights/osnet_x0_25_msmt17.pt
  gap_frames: 900
  max_anchor_dist: 400
  min_similarity: 0.6
stationarity:
  min_dwell_s: 3.0
  max_step_px: 4.0
  min_still_frames: 15
staff:
  stripe_band:
  - 0.18
  - 0.45
  green_hsv_low:
  - 35
  - 70
  - 40
  green_hsv_high:
  - 90
  - 255
  - 255
  red_hsv_low:
  - 155
  - 90
  - 50
  red_hsv_high:
  - 179
  - 255
  - 255
  min_cluster_frac: 0.03
  min_staff_frame_frac: 0.5
dwell:
  segment_gap_frames: 30
eval_slice:
- 26700
- 71000
eval:
  min_iou: 0.5
overlay:
  emit_render_frames: true
  output_path: outputs/overlay_conservative.mp4
  codec: mp4v
